<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Software stack dashboard tài chính Việt Nam</title>
  <desc id="desc">Sơ đồ luồng từ user tới frontend, API client, backend API, backend services, external data sources và local runtime.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1.5,1.5 L9,5.5 L1.5,9.5 Z" fill="#334155"/>
    </marker>
    <style>
      .frame { fill: #f8fafc; stroke: #dbe4ef; stroke-width: 2; }
      .section { fill: #e2e8f0; stroke: #cbd5e1; stroke-width: 1.6; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.8; }
      .blue { fill: #eff6ff; stroke: #60a5fa; }
      .green { fill: #ecfdf5; stroke: #34d399; }
      .amber { fill: #fffbeb; stroke: #f59e0b; }
      .violet { fill: #f5f3ff; stroke: #a78bfa; }
      .title { fill: #0f172a; font-family: Arial, sans-serif; font-size: 25px; font-weight: 700; }
      .subtitle { fill: #64748b; font-family: Arial, sans-serif; font-size: 14px; }
      .label { fill: #0f172a; font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .sub { fill: #475569; font-family: Arial, sans-serif; font-size: 13px; }
      .small { fill: #334155; font-family: Arial, sans-serif; font-size: 12px; }
      .section-title { fill: #0f172a; font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .line { fill: none; stroke: #334155; stroke-width: 2.1; marker-end: url(#arrow); }
      .bus { fill: none; stroke: #64748b; stroke-width: 1.8; }
      .bus-arrow { fill: none; stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrow); }
      .note { fill: #334155; font-family: Arial, sans-serif; font-size: 12px; }
    </style>
  </defs>

  <rect class="frame" x="18" y="18" width="1144" height="724" rx="18"/>
  <text class="title" x="50" y="58">Kiến trúc phần mềm dashboard tài chính Việt Nam</text>
  <text class="subtitle" x="50" y="82">Frontend hiển thị và gọi API; backend lấy dữ liệu, chuẩn hóa, chạy model và trả kết quả JSON.</text>

  <rect class="box blue" x="50" y="122" width="165" height="90" rx="13"/>
  <text class="label" x="108" y="157">User</text>
  <text class="sub" x="95" y="184">Browser</text>

  <rect class="box blue" x="275" y="112" width="205" height="110" rx="13"/>
  <text class="label" x="332" y="149">Frontend</text>
  <text class="sub" x="326" y="176">React + Vite</text>
  <text class="small" x="304" y="201">frontend/src/main.tsx</text>

  <rect class="box blue" x="540" y="112" width="205" height="110" rx="13"/>
  <text class="label" x="597" y="149">API Client</text>
  <text class="sub" x="591" y="176">fetch wrapper</text>
  <text class="small" x="569" y="201">frontend/src/lib/api.ts</text>

  <rect class="box green" x="805" y="112" width="230" height="110" rx="13"/>
  <text class="label" x="865" y="149">Backend API</text>
  <text class="sub" x="856" y="176">FastAPI /api/v1</text>
  <text class="small" x="850" y="201">backend/app/api/routes.py</text>

  <path class="line" d="M215 167 H275"/>
  <path class="line" d="M480 167 H540"/>
  <path class="line" d="M745 167 H805"/>

  <rect class="section" x="50" y="282" width="1085" height="230" rx="18"/>

  <rect class="box" x="74" y="362" width="155" height="74" rx="12"/>
  <text class="label" x="121" y="393">Macro</text>
  <text class="small" x="96" y="418">NSO, FRED, CafeF</text>

  <rect class="box" x="252" y="362" width="155" height="74" rx="12"/>
  <text class="label" x="294" y="393">Market</text>
  <text class="small" x="282" y="418">quotes, OHLCV</text>

  <rect class="box" x="430" y="362" width="155" height="74" rx="12"/>
  <text class="label" x="473" y="393">News</text>
  <text class="small" x="463" y="418">RSS, map, ticker</text>

  <rect class="box" x="608" y="362" width="155" height="74" rx="12"/>
  <text class="label" x="638" y="393">Valuation</text>
  <text class="small" x="632" y="418">BCTC, peers</text>

  <rect class="box" x="786" y="362" width="155" height="74" rx="12"/>
  <text class="label" x="825" y="393">Forecast</text>
  <text class="small" x="807" y="418">ARIMA, XGBoost, DL</text>

  <rect class="box" x="964" y="362" width="155" height="74" rx="12"/>
  <text class="label" x="1009" y="393">Risk</text>
  <text class="small" x="986" y="418">VaR, CVaR, Monte Carlo</text>

  <path class="bus" d="M920 222 V252 H151.5 V344"/>
  <path class="bus" d="M920 252 H1041.5 V344"/>
  <path class="bus-arrow" d="M151.5 344 V362"/>
  <path class="bus-arrow" d="M329.5 252 V362"/>
  <path class="bus-arrow" d="M507.5 252 V362"/>
  <path class="bus-arrow" d="M685.5 252 V362"/>
  <path class="bus-arrow" d="M863.5 252 V362"/>
  <path class="bus-arrow" d="M1041.5 344 V362"/>
  <rect x="66" y="245" width="178" height="34" rx="8" fill="#f8fafc"/>
  <text class="section-title" x="74" y="268">Backend services</text>

  <rect class="box amber" x="70" y="598" width="470" height="94" rx="13"/>
  <text class="label" x="217" y="633">External Data Sources</text>
  <text class="sub" x="103" y="661">vnstock, CafeF, Tuổi Trẻ RSS, NSO/PxWeb, Hải quan, FRED, Vietstock</text>

  <rect class="box violet" x="640" y="598" width="430" height="94" rx="13"/>
  <text class="label" x="777" y="633">Local Runtime</text>
  <text class="sub" x="684" y="661">logs, data, outputs, saved model params, local cache</text>

  <path class="bus" d="M151.5 436 V470 H305 V580"/>
  <path class="bus" d="M329.5 436 V470 H305 V580"/>
  <path class="bus" d="M507.5 436 V470 H305 V580"/>
  <path class="bus" d="M685.5 436 V470 H305 V580"/>
  <path class="bus-arrow" d="M305 580 V598"/>

  <path class="bus" d="M863.5 436 V470 H855 V580"/>
  <path class="bus" d="M1041.5 436 V470 H855 V580"/>
  <path class="bus-arrow" d="M855 580 V598"/>

  <text class="note" x="50" y="724">Local: Start Local Dashboard.cmd -> scripts/dev.ps1. Public: Public Dashboard.cmd -> scripts/public.ps1 -> cloudflared tunnel.</text>
</svg>
